<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新旭サッカースポーツ少年団 | 公式サイト</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="emblem.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:#0b0f1a;color:#fff;}
a{text-decoration:none;color:inherit;}

header{
position:fixed;width:100%;
background:rgba(0,0,40,0.9);
backdrop-filter:blur(10px);
z-index:1000;
}

.nav{
max-width:1100px;margin:auto;
display:flex;justify-content:space-between;
align-items:center;padding:15px 20px;
}

.logo{font-weight:900;}

.nav ul{display:flex;gap:25px;list-style:none;}

.menu-toggle{display:none;font-size:26px;cursor:pointer;}

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,40,0.75),rgba(0,0,40,0.9)),
url("image/anime.jpg") center/cover no-repeat;
display:flex;justify-content:center;
align-items:center;text-align:center;
padding:20px;
}

.hero h1{
font-size:48px;
line-height:1.4;
font-weight:900;
letter-spacing:2px;
}

.hero p{
margin-top:25px;
font-size:18px;
opacity:0.9;
}

.cta{margin-top:40px;}

.cta a{
display:inline-block;
padding:14px 30px;
background:#00d4ff;
color:#000;
border-radius:30px;
font-weight:700;
transition:0.3s;
}

.cta a:hover{background:#fff;}

section{
padding:100px 20px;
max-width:1000px;
margin:auto;
}

section h2{
font-size:28px;margin-bottom:30px;
border-left:5px solid #00d4ff;
padding-left:15px;
}

section h3{
font-size:24px;
margin-top:25px;
}

.info-box{
background:#12182a;
padding:25px;
border-radius:12px;
line-height:1.8;
}

.staff-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
margin-top:20px;
text-align:center;
}

.staff img{
width:100%;
border-radius:10px;
}

.staff-name{
margin-top:10px;
font-weight:700;
}

.schedule-table{
width:100%;
border-collapse:collapse;
text-align:center;
}

.schedule-table th,
.schedule-table td{
border:1px solid #2a324f;
padding:12px;
}

.schedule-table th{
background:#1a2340;
}

#monthly img{
width:100%;
max-width:800px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.photo-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.photo-grid img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.photo-grid img:hover{
transform:scale(1.05);
}

footer{
background:#050814;
text-align:center;
padding:30px;
color:#aaa;
}

@media(max-width:768px){

.nav ul{
position:absolute;
top:60px;
right:0;
background:#111a30;
flex-direction:column;
width:200px;
display:none;
padding:20px;
}

.nav ul.active{display:flex;}

.menu-toggle{display:block;}

.hero h1{font-size:28px;}
.hero p{font-size:16px;}

.schedule-table th,
.schedule-table td{
font-size:14px;
padding:8px;
}

.staff-grid{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">新旭サッカースポーツ少年団</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul id="menu">
<li><a href="#about">チーム紹介</a></li>
<li><a href="#practice">練習について</a></li>
<li><a href="#schedule">スケジュール</a></li>
<li><a href="#monthly">今月の予定</a></li>
<li><a href="#photos">活動写真</a></li>
<li><a href="#contact">体験参加</a></li>
</ul>
</div>
</header>

<div class="hero">
<div>

<h1>この数年間が土台になる。</h1>

<p>勝敗よりも、折れない心を。</p>

<div class="cta">
<a href="#contact">体験に行ってみる</a>
</div>

</div>
</div>

<section id="photos">

<h2>📸 活動写真</h2>

<div class="info-box">

<div class="photo-grid" id="photoGrid"></div>

</div>

</section>

<footer>
© 2026 新旭サッカースポーツ少年団
</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* GitHub photoフォルダ自動取得 */

async function loadPhotos(){

const owner = "ShinasahiSSS";
const repo = "test";
  
const api =
`https://api.github.com/repos/${owner}/${repo}/contents/photo`;

const res = await fetch(api);
const files = await res.json();

const grid = document.getElementById("photoGrid");

files
.filter(file =>
file.name.match(/\.(jpg|jpeg)$/i)
)
.forEach(file => {

const img = document.createElement("img");

img.src = file.download_url;

grid.appendChild(img);

});

}

loadPhotos();

</script>

</body>
</html>
