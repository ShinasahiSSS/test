<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>新旭サッカースポーツ少年団 | 公式サイト</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="emblem.png">

<style>

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
font-family:'Noto Sans JP',sans-serif;
background:#0b0f1a;
color:white;
}

a{text-decoration:none;color:inherit}

/* header */

header{
position:fixed;
width:100%;
background:rgba(0,0,40,0.9);
backdrop-filter:blur(10px);
z-index:1000;
}

.nav{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{font-weight:900}

.nav ul{
display:flex;
gap:25px;
list-style:none
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer
}

/* hero */

.hero{
height:100vh;

background:
linear-gradient(rgba(0,0,40,0.7),rgba(0,0,40,0.9)),
url("image/anime.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:48px;
font-weight:900;
letter-spacing:2px
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:.9
}

.cta{
margin-top:40px
}

.cta a{
background:#00d4ff;
color:#000;
padding:14px 30px;
border-radius:30px;
font-weight:700;
display:inline-block
}

/* section */

section{
padding:100px 20px;
max-width:1000px;
margin:auto;
position:relative
}

section::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:url("emblem.png") center/contain no-repeat;
opacity:.03;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none
}

section h2{
font-size:28px;
margin-bottom:30px;
border-left:5px solid #00d4ff;
padding-left:15px
}

.info-box{
background:#12182a;
padding:25px;
border-radius:12px;
line-height:1.8
}

/* staff */

.staff-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
text-align:center
}

.staff img{
width:100%;
border-radius:10px
}

.staff-name{
margin-top:10px;
font-weight:700
}

/* schedule */

.schedule-table{
width:100%;
border-collapse:collapse;
text-align:center
}

.schedule-table th,
.schedule-table td{
border:1px solid #2a324f;
padding:12px
}

.schedule-table th{
background:#1a2340
}

/* monthly */

#monthly img{
width:100%;
max-width:800px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.5)
}

/* photos */

.photo-main{
text-align:center;
margin-bottom:20px
}

.photo-main img{
max-width:100%;
border-radius:10px
}

.thumbnail-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px
}

.thumbnail-grid img{
width:100%;
cursor:pointer;
border-radius:6px;
transition:.2s
}

.thumbnail-grid img:hover{
transform:scale(1.05)
}

/* footer */

footer{
background:#050814;
text-align:center;
padding:30px;
color:#aaa
}

/* mobile */

@media(max-width:768px){

.hero{background-attachment:scroll}

.nav ul{
position:absolute;
top:60px;
right:0;
background:#111a30;
flex-direction:column;
width:200px;
display:none;
padding:20px
}

.nav ul.active{display:flex}

.menu-toggle{display:block}

.hero h1{font-size:28px}

.staff-grid{
grid-template-columns:1fr
}

}

</style>
</head>

<body>

<header>

<div class="nav">

<div class="logo">新旭サッカースポーツ少年団</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul id="menu">
<li><a href="#about">チーム紹介</a></li>
<li><a href="#practice">練習</a></li>
<li><a href="#schedule">スケジュール</a></li>
<li><a href="#photos">活動写真</a></li>
<li><a href="#contact">体験参加</a></li>
</ul>

</div>

</header>

<!-- hero -->

<div class="hero">

<div>

<h1>この数年間が土台になる。</h1>

<p>勝敗よりも、折れない心を。</p>

<div class="cta">
<a href="#contact">体験に行ってみる</a>
</div>

</div>

</div>

<!-- about -->

<section id="about">

<h2>チーム紹介</h2>

<div class="info-box">

<p>技術だけでなく、あいさつ・努力・仲間を思いやる心を大切にしています。</p>

</div>

</section>

<!-- staff -->

<section>

<h2>スタッフ</h2>

<div class="staff-grid">

<div class="staff">
<img src="staff/staff1.jpg">
<div class="staff-name">代表・山本</div>
</div>

<div class="staff">
<img src="staff/staff2.jpg">
<div class="staff-name">監督</div>
</div>

<div class="staff">
<img src="staff/staff3.jpg">
<div class="staff-name">コーチ</div>
</div>

</div>

</section>

<!-- photos -->

<section id="photos">

<h2>活動写真</h2>

<div class="photo-main">
<img id="mainPhoto">
</div>

<div id="thumbs" class="thumbnail-grid"></div>

</section>

<footer>

© 2026 新旭サッカースポーツ少年団

</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

let photos=[]
let index=0

const OWNER="ShinasahiSSS"
const REPO="test"

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/photo`

fetch(api)
.then(r=>r.json())
.then(files=>{

photos=files
.filter(f=>{
const name=f.name.toLowerCase()
return name.endsWith(".jpg")||name.endsWith(".jpeg")
})
.map(f=>f.download_url)

if(photos.length>0){
showPhoto(0)
createThumbs()
setInterval(nextPhoto,3000)
}

})

function showPhoto(i){
index=i
document.getElementById("mainPhoto").src=photos[index]
}

function nextPhoto(){
index++
if(index>=photos.length){index=0}
showPhoto(index)
}

function createThumbs(){

const box=document.getElementById("thumbs")

photos.forEach((p,i)=>{

const img=document.createElement("img")
img.src=p
img.onclick=()=>showPhoto(i)

box.appendChild(img)

})

}

</script>

</body>
</html>
